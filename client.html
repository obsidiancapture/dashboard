<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Mon espace — Obsidian Capture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --tx:#0d3340;--tx2:#1e4a5c;--tx3:#4a8fa0;--tx4:#89b8c8;
  --grn:#14532d;--org:#9a3412;--red:#991b1b;--blu:#0c5f74;
  --r:12px;--rl:18px;--rxl:26px;
  --sf:"DM Sans",-apple-system,sans-serif;
  --serif:"Instrument Serif",Georgia,serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;-webkit-font-smoothing:antialiased;}
body{color:var(--tx);font-family:var(--sf);min-height:100vh;overflow-x:hidden;background:#f0f9fb;}

.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;background:#f0f9fb;}
.blob{position:absolute;border-radius:0;filter:none;opacity:1;}
.blob-1{width:55vw;height:70vh;background:linear-gradient(135deg,rgba(12,95,116,.18) 0%,rgba(0,155,185,.08) 100%);clip-path:polygon(0 0,100% 0,72% 100%,0 100%);top:0;left:0;}
.blob-2{width:48vw;height:60vh;background:linear-gradient(315deg,rgba(0,155,185,.12) 0%,rgba(12,95,116,.06) 100%);clip-path:polygon(30% 0,100% 0,100% 100%,0 100%);bottom:0;right:0;top:auto;}

.glass{position:relative;background:rgba(255,255,255,.60);border:1px solid rgba(12,95,116,.15);box-shadow:0 1px 0 rgba(255,255,255,.7) inset,0 -1px 0 rgba(255,255,255,.3) inset,0 8px 32px rgba(12,95,116,.08),0 1px 2px rgba(12,95,116,.04);overflow:hidden;}
.glass::before{content:"";position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,.45) 0%,rgba(255,255,255,0) 100%);pointer-events:none;z-index:0;}
.glass::after{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.5) 0%,transparent 30%,transparent 70%,rgba(255,255,255,.2) 100%);mix-blend-mode:overlay;pointer-events:none;z-index:0;}
.glass > *{position:relative;z-index:1;}

.shell{position:relative;z-index:2;min-height:100vh;padding:28px 24px 80px;max-width:960px;margin:0 auto;}

.app-head{margin-bottom:32px;}
.kicker{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:999px;background:rgba(255,255,255,.60);border:1px solid rgba(12,95,116,.18);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--tx);box-shadow:0 1px 0 rgba(255,255,255,.7) inset,0 4px 12px rgba(12,95,116,.08);margin-bottom:14px;}
.kicker::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--blu);}
.page-title{font-family:var(--serif);font-size:clamp(52px,8vw,110px);font-weight:400;letter-spacing:-.03em;line-height:.88;color:var(--tx);margin-bottom:10px;}
.page-title em{font-style:italic;opacity:.45;}
.page-sub{font-size:14px;color:var(--tx2);line-height:1.5;max-width:480px;}

.section{margin-bottom:32px;}
.sec-t{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec-t::after{content:"";flex:1;height:1px;background:rgba(12,95,116,.12);}

/* Facturation */
.fact-card{border-radius:var(--rl);padding:22px 24px;}
.fg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:18px;}
.fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);}
.fv{font-family:var(--serif);font-size:30px;font-weight:400;color:var(--tx);letter-spacing:-.02em;margin-top:4px;}
.fc{display:flex;align-items:center;gap:5px;margin-top:5px;}
.fd{width:7px;height:7px;border-radius:50%;}
.pw{height:5px;background:rgba(12,95,116,.1);border-radius:4px;overflow:hidden;}
.pf{height:100%;border-radius:4px;transition:width .6s;}
.pl{display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);margin-top:5px;font-weight:600;}

/* KPIs livrables */
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.kpic{border-radius:var(--rl);padding:16px 18px;display:flex;flex-direction:column;gap:3px;}
.kpic.dark{background:rgba(12,75,95,.90) !important;border-color:rgba(12,75,95,.6) !important;}
.kpic.dark .klbl{color:rgba(255,255,255,.55);}
.kpic.dark .kval{color:#fff;}
.klbl{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--tx3);}
.kval{font-family:var(--serif);font-size:32px;font-weight:400;color:var(--tx);letter-spacing:-.02em;line-height:1;}
.cg{color:var(--grn);}.ca{color:var(--org);}.cr{color:var(--red);}.cm{color:var(--tx3);}

/* Livrables */
.lc{border-radius:var(--rl);padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;}
.li{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.lt{font-size:14px;font-weight:700;color:var(--tx);}
.lm{font-size:12px;color:var(--tx3);margin-top:2px;}
.lb{padding:3px 10px;border-radius:999px;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.s-en_attente{background:rgba(12,95,116,.08);color:var(--tx3);}
.s-en_cours{background:rgba(12,95,116,.14);color:var(--blu);}
.s-livre{background:rgba(20,83,45,.14);color:var(--grn);}
.s-valide{background:rgba(20,83,45,.22);color:var(--grn);}
.s-revision{background:rgba(154,52,18,.1);color:var(--org);}
.nb{margin-top:10px;padding-top:10px;border-top:1px solid rgba(12,95,116,.08);width:100%;}
.nbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--tx3);margin-bottom:5px;}
.ni{width:100%;background:rgba(255,255,255,.45);border:1px solid rgba(12,95,116,.15);border-radius:var(--r);padding:9px 12px;font-family:var(--sf);font-size:13px;color:var(--tx);outline:none;resize:vertical;min-height:60px;}
.ni:focus{background:rgba(255,255,255,.75);border-color:rgba(12,95,116,.3);}
.svbtn{margin-top:6px;padding:6px 16px;border-radius:999px;background:rgba(12,75,95,.90);color:#fff;border:none;font-family:var(--sf);font-size:12px;font-weight:700;cursor:pointer;}
.svbtn:hover{background:rgba(12,55,75,1);}

/* Stats réseaux */
.pc{border-radius:var(--rl);margin-bottom:12px;overflow:hidden;}
.plat-hd{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid rgba(12,95,116,.08);}
.pio{font-size:18px;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pnm{font-size:15px;font-weight:800;}
.pdt{font-size:12px;color:var(--tx3);}
.pab{margin-left:auto;text-align:right;}
.pav{font-family:var(--serif);font-size:28px;font-weight:400;color:var(--tx);letter-spacing:-.02em;}
.pad{font-size:12px;font-weight:700;}
.pb2{padding:14px 18px;}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.sb2{display:flex;flex-direction:column;gap:3px;}
.sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--tx3);}
.sv{font-family:var(--serif);font-size:20px;font-weight:400;color:var(--tx);letter-spacing:-.01em;}
.sdiv{height:1px;background:rgba(12,95,116,.08);margin:12px 0;}

/* Messages */
.ml{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;max-height:320px;overflow-y:auto;}
.msg{padding:10px 14px;border-radius:12px;max-width:82%;}
.msg.obs{background:rgba(12,75,95,.90);color:#fff;align-self:flex-start;border-radius:4px 12px 12px 12px;}
.msg.cli{background:rgba(255,255,255,.55);color:var(--tx);align-self:flex-end;border-radius:12px 4px 12px 12px;border:1px solid rgba(12,95,116,.15);}
.mm{font-size:10px;font-weight:700;opacity:.5;margin-bottom:3px;}
.mt{font-size:13px;line-height:1.5;}
.mw{display:flex;gap:8px;}
.mi{flex:1;background:rgba(255,255,255,.50);border:1px solid rgba(12,95,116,.15);border-radius:var(--r);padding:11px 14px;font-family:var(--sf);font-size:14px;color:var(--tx);outline:none;}
.mi:focus{background:rgba(255,255,255,.75);border-color:rgba(12,95,116,.30);}
.ms{padding:11px 20px;border-radius:999px;background:rgba(12,75,95,.90);color:#fff;border:none;font-family:var(--sf);font-size:13px;font-weight:700;cursor:pointer;}
.ms:hover{background:rgba(12,55,75,1);}

.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px;position:relative;z-index:2;}
.spin{width:34px;height:34px;border:3px solid rgba(12,95,116,.15);border-top-color:rgba(12,75,95,.7);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.ec{background:rgba(153,27,27,.08);border:1px solid rgba(153,27,27,.18);border-radius:var(--rl);padding:28px;color:var(--red);font-weight:700;text-align:center;margin:40px auto;max-width:400px;position:relative;z-index:2;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(14px);background:rgba(12,75,95,.95);color:#fff;border-radius:999px;padding:11px 22px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:600px){
  .fg,.sg{grid-template-columns:1fr 1fr;}
  .kpis{grid-template-columns:1fr 1fr;}
  .shell{padding:16px 14px 60px;}
}
</style>
</head>
<body>

<div class="bg-canvas"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

<div id="loading" class="loading">
  <div class="spin"></div>
  <div style="font-size:13px;color:var(--tx3);font-weight:600">Chargement de votre espace...</div>
</div>
<div id="err-wrap" style="display:none;padding:40px 24px;"></div>

<div id="app" style="display:none;">
  <div class="shell">

    <div class="app-head">
      <span class="kicker">Obsidian Capture</span>
      <h1 class="page-title" id="client-title">Mon<br><em>espace</em></h1>
      <p class="page-sub">Vos livrables, statistiques et factures en un coup d'œil.</p>
    </div>

    <div class="section">
      <div class="sec-t">Facturation</div>
      <div class="fact-card glass" id="fact"></div>
    </div>

    <div class="section">
      <div class="sec-t">Livrables</div>
      <div id="livs"></div>
    </div>

    <div class="section">
      <div class="sec-t">Réseaux sociaux</div>
      <div id="stats"></div>
    </div>

    <div class="section">
      <div class="sec-t">Messages avec Obsidian Capture</div>
      <div class="ml" id="msgs"></div>
      <div class="mw">
        <input type="text" class="mi" id="msg-in" placeholder="Votre message...">
        <button class="ms" onclick="sendMsg()">Envoyer</button>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SB_URL='https://fytcyqvvmxbnvingvaen.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5dGN5cXZ2bXhibnZpbmd2YWVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODcwNjQsImV4cCI6MjA5MTk2MzA2NH0.XFBMB9FSV_sIFW0EFS0-H1KCRYbiXLiz-d-QF5-rLtU';
var CLIENT=null,CID=null;
function api(t,p){return fetch(SB_URL+'/rest/v1/'+t+'?'+(p||''),{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}).then(function(r){return r.json();});}
function apiPost(t,d){return fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(d)}).then(function(r){return r.json();});}
function apiPatch(t,id,d){return fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},body:JSON.stringify(d)});}
function g(id){return document.getElementById(id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtK(n){n=n||0;return n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'k':String(n);}
function fmtD(s){if(!s)return'--';var d=new Date(s);return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();}
function toast(msg){var t=g('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2400);}

function init(){
  var token=new URLSearchParams(window.location.search).get('token');
  if(!token){showErr('Lien invalide.');return;}
  api('clients','token=eq.'+token+'&select=*').then(function(d){
    if(!d||!d.length){showErr('Client introuvable.');return;}
    CLIENT=d[0];CID=CLIENT.id;
    g('client-title').innerHTML=esc(CLIENT.nom)+'<br><em>espace</em>';
    document.title=CLIENT.nom+' \u2014 Obsidian Capture';
    loadAll();
  }).catch(function(){showErr('Erreur de connexion.');});
}

function showErr(msg){
  g('loading').style.display='none';
  g('err-wrap').style.display='block';
  g('err-wrap').innerHTML='<div class="ec">'+msg+'</div>';
}

function loadAll(){
  Promise.all([
    api('facturation','client_id=eq.'+CID+'&select=*'),
    api('livrables','client_id=eq.'+CID+'&select=*&order=created_at.asc'),
    api('stats_clients','client_id=eq.'+CID+'&select=*&order=mois.desc'),
    api('messages','client_id=eq.'+CID+'&select=*&order=created_at.asc')
  ]).then(function(r){
    renderFact(r[0][0]||{});
    renderLivs(r[1]||[]);
    renderStats(r[2]||[]);
    renderMsgs(r[3]||[]);
    g('loading').style.display='none';
    g('app').style.display='block';
  }).catch(function(){showErr('Erreur de chargement.');});
}

function renderFact(f){
  var bg=f.budget_total||0,ac=f.acompte||0,sol=f.solde||0;
  var paye=(f.acompte_paye?ac:0)+(f.solde_paye?sol:0);
  var pct=bg>0?Math.min(100,Math.round(paye/bg*100)):0;
  var pc=pct>=100?'#14532d':pct>=50?'#9a3412':'#991b1b';
  g('fact').innerHTML=
    '<div class="fg">'+
    '<div><div class="fl">Budget total</div><div class="fv">'+bg.toLocaleString('fr-FR')+' &euro;</div></div>'+
    '<div><div class="fl">Acompte</div><div class="fv">'+ac.toLocaleString('fr-FR')+' &euro;</div>'+
      '<div class="fc"><div class="fd" style="background:'+(f.acompte_paye?'#14532d':'rgba(12,95,116,.2)')+'"></div>'+
      '<span style="font-size:12px;font-weight:700;color:'+(f.acompte_paye?'#14532d':'var(--tx3)')+'">'+
      (f.acompte_paye?'Pay&eacute; ✓':'En attente')+'</span></div></div>'+
    '<div><div class="fl">Solde</div><div class="fv">'+sol.toLocaleString('fr-FR')+' &euro;</div>'+
      '<div class="fc"><div class="fd" style="background:'+(f.solde_paye?'#14532d':'rgba(12,95,116,.2)')+'"></div>'+
      '<span style="font-size:12px;font-weight:700;color:'+(f.solde_paye?'#14532d':'var(--tx3)')+'">'+
      (f.solde_paye?'Pay&eacute; ✓':'En attente')+'</span></div></div>'+
    '</div>'+
    '<div class="pw"><div class="pf" style="width:'+pct+'%;background:'+pc+'"></div></div>'+
    '<div class="pl"><span>'+paye.toLocaleString('fr-FR')+' &euro; pay&eacute;s</span><span>'+pct+'%</span><span>'+bg.toLocaleString('fr-FR')+' &euro; total</span></div>'+
    (f.date_echeance?'<div style="margin-top:10px;font-size:12px;color:var(--tx3);font-weight:600">&Eacute;ch&eacute;ance : '+fmtD(f.date_echeance)+'</div>':'')+
    (f.notes?'<div style="margin-top:10px;font-size:13px;color:var(--tx2);background:rgba(255,255,255,.55);border:1px solid rgba(12,95,116,.12);border-radius:var(--r);padding:10px 12px">'+esc(f.notes)+'</div>':'');
}

var SL={en_attente:'En attente',en_cours:'En cours',livre:'Livr&eacute;',valide:'Valid&eacute;',revision:'R&eacute;vision'};
var SC={en_attente:'rgba(12,95,116,.07)',en_cours:'rgba(12,95,116,.13)',livre:'rgba(20,83,45,.1)',valide:'rgba(20,83,45,.16)',revision:'rgba(154,52,18,.08)'};
var SI={en_attente:'⏳',en_cours:'🎬',livre:'✅',valide:'🏆',revision:'✏️'};

function renderLivs(livs){
  var w=g('livs');
  if(!livs.length){
    w.innerHTML='<div class="glass" style="border-radius:var(--rl);padding:44px;text-align:center;color:var(--tx3);font-family:var(--serif);font-size:22px;font-style:italic">Aucun livrable pour le moment\u2026</div>';
    return;
  }
  var total=livs.length,done=livs.filter(function(l){return l.statut==='livre'||l.statut==='valide';}).length;
  var pct=Math.round(done/total*100);
  var kpis='<div class="kpis">'+
    '<div class="kpic glass dark"><div class="klbl">Total</div><div class="kval">'+total+'</div></div>'+
    '<div class="kpic glass"><div class="klbl">Livr&eacute;s</div><div class="kval cg">'+done+'</div></div>'+
    '<div class="kpic glass"><div class="klbl">Avancement</div><div class="kval">'+pct+'%</div>'+
    '<div class="pw" style="margin-top:8px"><div class="pf" style="width:'+pct+'%;background:#14532d"></div></div></div>'+
  '</div>';
  var cards=livs.map(function(l){
    var bg=SC[l.statut]||'rgba(12,95,116,.07)';
    return '<div class="lc glass">'+
      '<div class="li" style="background:'+bg+'">'+(SI[l.statut]||'🎬')+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="lt">'+esc(l.titre)+'</div>'+
        '<div class="lm">'+(l.format||'')+(l.plateforme?' &middot; '+l.plateforme:'')+(l.date_prevue?' &middot; Pr&eacute;vu '+fmtD(l.date_prevue):'')+'</div>'+
        (l.notes?'<div style="font-size:12px;color:var(--tx2);margin-top:6px;padding:7px 10px;background:rgba(255,255,255,.50);border:1px solid rgba(12,95,116,.12);border-radius:8px">'+esc(l.notes)+'</div>':'')+
        '<div class="nb"><div class="nbl">Votre commentaire</div>'+
          '<textarea class="ni" id="nc-'+l.id+'" placeholder="Retours, demandes...">'+esc(l.notes_client||'')+'</textarea>'+
          '<button class="svbtn" data-lid="'+l.id+'" onclick="saveNote(this.getAttribute(\'data-lid\'))">Enregistrer</button>'+
        '</div>'+
      '</div>'+
      '<span class="lb s-'+(l.statut||'en_attente')+'">'+(SL[l.statut]||l.statut)+'</span>'+
    '</div>';
  }).join('');
  w.innerHTML=kpis+cards;
}

function saveNote(id){
  var val=g('nc-'+id).value;
  apiPatch('livrables',id,{notes_client:val}).then(function(){toast('Commentaire enregistr\u00e9 \u2713');});
}

var PLATS=[
  {id:'Instagram',ico:'◎',color:'#c1306c',bg:'rgba(193,48,108,.12)'},
  {id:'TikTok',ico:'◆',color:'#111',bg:'rgba(0,0,0,.08)'},
  {id:'YouTube',ico:'▶',color:'#c53030',bg:'rgba(197,48,48,.12)'}
];

function renderStats(stats){
  var w=g('stats'),html='';
  PLATS.forEach(function(plat){
    var ps=stats.filter(function(s){return s.plateforme===plat.id;}).sort(function(a,b){return b.mois.localeCompare(a.mois);});
    if(!ps.length)return;
    var l=ps[0],prev=ps[1]||{},delta=(l.abonnes||0)-(prev.abonnes||0);
    html+='<div class="pc glass">'+
      '<div class="plat-hd">'+
        '<div class="pio" style="background:'+plat.bg+';color:'+plat.color+'">'+plat.ico+'</div>'+
        '<div><div class="pnm" style="color:'+plat.color+'">'+plat.id+'</div><div class="pdt">'+l.mois+'</div></div>'+
        '<div class="pab">'+
          '<div class="pav">'+fmtK(l.abonnes)+'</div>'+
          '<div class="pad '+(delta>0?'cg':delta<0?'cr':'cm')+'">'+(delta>0?'+':'')+fmtK(delta)+' ce mois</div>'+
        '</div>'+
      '</div>'+
      '<div class="pb2"><div class="sg">'+
        ms('Vues',l.vues)+ms('Port&eacute;e',l.reach)+ms('Impressions',l.impressions)+
        ms('Likes',l.likes)+ms('Commentaires',l.commentaires)+ms('Sauvegardes',l.sauvegardes)+
        ms('Partages',l.partages)+ms('Nouv. abonn&eacute;s',l.nouveaux_abonnes)+
        '<div class="sb2"><div class="sl">Engagement</div><div class="sv ca">'+(l.engagement?parseFloat(l.engagement).toFixed(1)+'%':'--')+'</div></div>'+
      '</div>'+
      (l.meilleur_post?'<div class="sdiv"></div><div class="sb2"><div class="sl">&#9733; Meilleur post</div><div style="font-size:14px;font-weight:700;margin-top:4px">'+esc(l.meilleur_post)+'</div></div>':'')+
      '</div></div>';
  });
  if(!html)html='<div class="glass" style="border-radius:var(--rl);padding:44px;text-align:center;color:var(--tx3);font-family:var(--serif);font-size:22px;font-style:italic">Statistiques disponibles bient\u00f4t</div>';
  w.innerHTML=html;
}

function ms(lbl,val){return '<div class="sb2"><div class="sl">'+lbl+'</div><div class="sv">'+(val?fmtK(val):'--')+'</div></div>';}

function renderMsgs(msgs){
  var w=g('msgs');
  if(!msgs.length){
    w.innerHTML='<div style="text-align:center;padding:22px;color:var(--tx3);font-size:13px;font-style:italic;font-family:var(--serif)">Aucun message pour l\'instant</div>';
    return;
  }
  w.innerHTML=msgs.map(function(m){
    var isO=m.auteur==='obsidian';
    return '<div class="msg '+(isO?'obs':'cli')+'">'+
      '<div class="mm">'+(isO?'Obsidian Capture':esc(CLIENT.nom))+'</div>'+
      '<div class="mt">'+esc(m.contenu)+'</div></div>';
  }).join('');
  w.scrollTop=w.scrollHeight;
}

function sendMsg(){
  var inp=g('msg-in'),txt=inp.value.trim();
  if(!txt)return;
  inp.value='';
  apiPost('messages',{client_id:CID,auteur:'client',contenu:txt})
    .then(function(){return api('messages','client_id=eq.'+CID+'&select=*&order=created_at.asc');})
    .then(function(msgs){renderMsgs(msgs);toast('Message envoy\u00e9 \u2713');});
}

g('msg-in').addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});
init();
</script>
</body>
</html>
