<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Obsidian — Espace client</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f7f7;--white:#fff;--black:#111;--dark:#1a1a1a;
  --gray1:#f0f0f0;--gray2:#e0e0e0;--gray3:#b0b0b0;
  --tx:#111;--tx2:#555;--tx3:#999;
  --grn:#2d6a4f;--gnb:rgba(45,106,79,.1);
  --org:#c05621;--orb:rgba(192,86,33,.1);
  --red:#c53030;--rdb:rgba(197,48,48,.1);
  --blu:#1a56db;--blb:rgba(26,86,219,.1);
  --sh:0 1px 3px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);
  --r:10px;--rl:14px;
  --sf:"Inter",-apple-system,sans-serif;
  --serif:"Cormorant Garamond",Georgia,serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--tx);font-family:var(--sf);min-height:100vh;}
.topbar{background:var(--black);padding:0 24px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:20;}
.logo{font-family:var(--serif);font-size:18px;font-weight:600;color:#fff;line-height:1.2;}
.logo em{color:rgba(255,255,255,.45);font-style:italic;}
.top-name{flex:1;font-size:13px;font-weight:600;color:rgba(255,255,255,.6);margin-left:12px;}
.top-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);}
.navtabs{display:flex;background:var(--white);border-bottom:1px solid var(--gray2);overflow-x:auto;scrollbar-width:none;position:sticky;top:56px;z-index:19;}
.navtabs::-webkit-scrollbar{display:none;}
.ntab{padding:14px 18px;font-family:var(--sf);font-size:13px;font-weight:600;color:var(--tx3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;}
.ntab:hover{color:var(--tx);}.ntab.on{color:var(--black);border-bottom-color:var(--black);}
.page{display:none;padding:20px;max-width:860px;margin:0 auto;}.page.on{display:block;}
.sec{background:var(--white);border:1px solid var(--gray2);border-radius:var(--rl);margin-bottom:16px;overflow:hidden;box-shadow:var(--sh);}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--gray2);}
.sec-hdr-l{display:flex;align-items:center;gap:10px;}
.sec-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.sec-title{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--black);}
.sec-body{padding:16px 20px;}
.addbtn{padding:8px 16px;border-radius:20px;background:var(--black);color:#fff;border:none;font-family:var(--sf);font-size:12px;font-weight:700;cursor:pointer;}
.addbtn:hover{background:var(--dark);}
.krow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.kc{background:var(--gray1);border-radius:var(--r);padding:12px 14px;}
.kc.dark{background:var(--black);}
.kc.dark .kl{color:rgba(255,255,255,.5);}.kc.dark .kv{color:#fff;}
.kl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.kv{font-size:20px;font-weight:800;color:var(--tx);letter-spacing:-.02em;line-height:1.1;}
.ks{font-size:11px;font-weight:500;margin-top:2px;}
.prog{height:5px;background:var(--gray2);border-radius:3px;overflow:hidden;margin-top:5px;}
.prog-f{height:100%;border-radius:3px;transition:width .6s;}
.cg{color:var(--grn);}.ca{color:var(--org);}.cr{color:var(--red);}.cm{color:var(--tx3);}
.week-hdr{display:flex;align-items:center;gap:8px;padding:8px 0 4px;}
.week-lbl{font-size:12px;font-weight:700;color:var(--tx3);}
.week-prog{flex:1;height:3px;background:var(--gray2);border-radius:2px;overflow:hidden;}
.week-prog-f{height:100%;border-radius:2px;}
.reel-row{display:grid;grid-template-columns:26px 1fr auto auto;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--gray2);}
.reel-row:last-child{border-bottom:none;}
.reel-num{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;cursor:pointer;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
.sc-idee{background:var(--gray1);color:var(--tx3);}
.sc-tourne{background:var(--blb);color:var(--blu);}
.sc-monte{background:var(--orb);color:var(--org);}
.sc-publie{background:var(--gnb);color:var(--grn);}
.b-wait{background:var(--gray1);color:var(--tx3);}
.b-wip{background:var(--blb);color:var(--blu);}
.b-done{background:var(--gnb);color:var(--grn);}
.b-ok{background:var(--gnb);color:var(--grn);}
.b-rev{background:var(--orb);color:var(--org);}
.liv-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--gray2);}
.liv-item:last-child{border-bottom:none;}
.liv-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.liv-info{flex:1;min-width:0;}
.comment-form{margin-top:8px;display:flex;gap:6px;}
.comment-input{flex:1;background:var(--gray1);border:1px solid var(--gray2);border-radius:var(--r);padding:8px 12px;font-family:var(--sf);font-size:12px;color:var(--tx);outline:none;resize:none;min-height:56px;line-height:1.5;}
.comment-input:focus{background:var(--white);border-color:var(--black);}
.cbtn{padding:7px 12px;border-radius:20px;background:var(--black);color:#fff;border:none;font-family:var(--sf);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;align-self:flex-end;}
.stat-plat-card{background:var(--gray1);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.stat-g{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;}
.stat-b .sl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.03em;}
.stat-b .sv{font-size:17px;font-weight:800;color:var(--tx);letter-spacing:-.02em;}
.evo-bar{display:flex;align-items:flex-end;gap:4px;height:44px;margin-top:10px;}
.evo-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.evo-b{width:100%;border-radius:4px 4px 0 0;}
.evo-x{font-size:8px;color:var(--tx3);text-align:center;}
.fact-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--gray2);}
.fact-row:last-child{border-bottom:none;}
.fact-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
.paid{background:var(--gnb);color:var(--grn);}.unpaid{background:var(--gray1);color:var(--tx3);}
.msg-list{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto;margin-bottom:12px;}
.msg-bubble{padding:10px 14px;border-radius:12px;font-size:13px;max-width:85%;line-height:1.5;}
.msg-bubble.obs{background:var(--black);color:#fff;align-self:flex-start;}
.msg-bubble.cli{background:var(--blb);color:var(--blu);align-self:flex-end;}
.msg-who{font-size:10px;font-weight:700;opacity:.5;margin-bottom:2px;}
.msg-send{display:flex;gap:8px;}
.msg-in{flex:1;background:var(--gray1);border:1px solid var(--gray2);border-radius:var(--r);padding:10px 14px;font-family:var(--sf);font-size:13px;color:var(--tx);outline:none;}
.msg-in:focus{background:var(--white);border-color:var(--black);}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:90;align-items:flex-end;justify-content:center;}
.mbg.open{display:flex;}
.msh{background:var(--white);border-radius:20px 20px 0 0;padding:20px 20px max(40px,env(safe-area-inset-bottom)) 20px;width:560px;max-width:100vw;max-height:90vh;overflow-y:auto;box-shadow:0 -8px 30px rgba(0,0,0,.15);animation:shUp .25s cubic-bezier(.4,0,.2,1);}
@keyframes shUp{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.mhd{width:36px;height:4px;border-radius:2px;background:var(--gray2);margin:0 auto 16px;}
.mtl{font-family:var(--serif);font-size:24px;font-weight:600;margin-bottom:16px;}
.mtl em{color:var(--tx3);font-style:italic;font-weight:400;}
.qg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.qfu{grid-column:1/-1;}
.qf{display:flex;flex-direction:column;gap:4px;}
.qf label{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.03em;text-transform:uppercase;}
.qf input,.qf select{background:var(--gray1);border:1px solid var(--gray2);border-radius:var(--r);padding:10px 12px;font-family:var(--sf);font-size:14px;color:var(--tx);outline:none;}
.qf input:focus,.qf select:focus{background:var(--white);border-color:var(--black);}
.mac{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--gray2);}
.pill{padding:6px 13px;border-radius:20px;border:1px solid var(--gray2);background:var(--white);font-family:var(--sf);font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.pill:hover{background:var(--gray1);}.pill.on{background:var(--black);color:#fff;border-color:var(--black);}
.btn{padding:9px 18px;border-radius:20px;font-family:var(--sf);font-size:13px;font-weight:700;cursor:pointer;border:none;}
.bprim{background:var(--black);color:#fff;}.bsec{background:var(--gray1);color:var(--tx);border:1px solid var(--gray2);}
.empty{text-align:center;padding:36px 16px;}
.empty-i{font-size:28px;opacity:.2;margin-bottom:6px;}
.empty-t{font-family:var(--serif);font-size:17px;font-weight:600;font-style:italic;color:var(--tx2);margin-bottom:4px;}
.empty-s{font-size:12px;color:var(--tx3);}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:12px;}
.spinner{width:30px;height:30px;border:3px solid var(--gray2);border-top-color:var(--black);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--black);color:#fff;border-radius:20px;padding:10px 22px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.err-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:10px;text-align:center;padding:40px;}
@media(max-width:600px){.krow{grid-template-columns:repeat(2,1fr);}.stat-g{grid-template-columns:repeat(2,1fr);}.topbar,.page{padding-left:16px;padding-right:16px;}.reel-row{grid-template-columns:26px 1fr auto;}}
</style>
</head>
<body>

<div id="app-loading" class="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--tx3)">Chargement...</div>
</div>

<div id="app-error" style="display:none" class="err-page">
  <div style="font-size:44px;opacity:.2">◈</div>
  <div style="font-family:var(--serif);font-size:22px;font-weight:600;font-style:italic;color:var(--tx2)">Lien invalide</div>
  <div style="font-size:13px;color:var(--tx3)">Contactez Obsidian Capture pour obtenir un nouveau lien.</div>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <div class="logo">Obsidian<br><em>Capture</em></div>
    <div class="top-name" id="top-name"></div>
    <div class="top-badge">Espace client</div>
  </div>
  <div class="navtabs">
    <button class="ntab on" data-tab="accueil" onclick="showTab('accueil')">🏠 Accueil</button>
    <button class="ntab" data-tab="contenu" onclick="showTab('contenu')">▶ Contenu</button>
    <button class="ntab" data-tab="livrables" onclick="showTab('livrables')">📦 Livrables</button>
    <button class="ntab" data-tab="stats" onclick="showTab('stats')">↗ Réseaux</button>
    <button class="ntab" data-tab="factu" onclick="showTab('factu')">💳 Facturation</button>
    <button class="ntab" data-tab="messages" onclick="showTab('messages')">💬 Messages</button>
  </div>

  <div class="page on" id="tab-accueil">
    <div class="sec">
      <div class="sec-hdr">
        <div class="sec-hdr-l">
          <div class="sec-ic" style="background:var(--gray1)">👋</div>
          <div><div class="sec-title" id="welcome-title">Bonjour !</div><div style="font-size:11px;color:var(--tx3);margin-top:1px">Votre espace Obsidian Capture</div></div>
        </div>
      </div>
      <div class="sec-body">
        <div class="krow" id="accueil-kpis"></div>
        <div id="accueil-preview"></div>
      </div>
    </div>
  </div>

  <div class="page" id="tab-contenu">
    <div class="sec">
      <div class="sec-hdr">
        <div class="sec-hdr-l">
          <div class="sec-ic" style="background:var(--orb)">▶</div>
          <div class="sec-title">Contenu &amp; Réels</div>
        </div>
        <button class="addbtn" onclick="openBatch()">+ Batch</button>
      </div>
      <div class="sec-body">
        <div class="krow" id="contenu-kpis"></div>
        <div id="contenu-body"></div>
      </div>
    </div>
  </div>

  <div class="page" id="tab-livrables">
    <div class="sec">
      <div class="sec-hdr"><div class="sec-hdr-l"><div class="sec-ic" style="background:var(--gnb)">📦</div><div class="sec-title">Mes livrables</div></div></div>
      <div class="sec-body" id="livs-body"></div>
    </div>
  </div>

  <div class="page" id="tab-stats">
    <div class="sec">
      <div class="sec-hdr"><div class="sec-hdr-l"><div class="sec-ic" style="background:var(--blb)">↗</div><div class="sec-title">Réseaux sociaux</div></div></div>
      <div class="sec-body" id="stats-body"></div>
    </div>
  </div>

  <div class="page" id="tab-factu">
    <div class="sec">
      <div class="sec-hdr"><div class="sec-hdr-l"><div class="sec-ic" style="background:var(--gnb)">💳</div><div class="sec-title">Facturation</div></div></div>
      <div class="sec-body" id="factu-body"></div>
    </div>
  </div>

  <div class="page" id="tab-messages">
    <div class="sec">
      <div class="sec-hdr"><div class="sec-hdr-l"><div class="sec-ic" style="background:var(--orb)">💬</div><div class="sec-title">Messages</div></div></div>
      <div class="sec-body">
        <div class="msg-list" id="msg-list"></div>
        <div class="msg-send">
          <input type="text" class="msg-in" id="msg-in" placeholder="Votre message..." onkeydown="if(event.key==='Enter')sendMsg()">
          <button class="cbtn" onclick="sendMsg()">Envoyer</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL BATCH -->
<div class="mbg" id="m-batch">
  <div class="msh" onclick="event.stopPropagation()">
    <div class="mhd"></div>
    <div class="mtl">Batch <em>contenu</em></div>
    <div class="qg" style="margin-bottom:12px">
      <div class="qf">
        <label>Semaine</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px" id="b-week-pills"></div>
        <input type="hidden" id="b-week" value="1">
      </div>
      <div class="qf">
        <label>Nombre de réels</label>
        <div style="display:flex;align-items:center;gap:10px;margin-top:8px">
          <button type="button" onclick="adjB(-1)" style="width:34px;height:34px;border-radius:50%;border:1px solid var(--gray2);background:var(--gray1);font-size:18px;cursor:pointer;font-weight:700">−</button>
          <span id="b-cnt-lbl" style="font-size:26px;font-weight:800;min-width:36px;text-align:center">3</span>
          <button type="button" onclick="adjB(1)" style="width:34px;height:34px;border-radius:50%;border:1px solid var(--gray2);background:var(--gray1);font-size:18px;cursor:pointer;font-weight:700">+</button>
        </div>
        <input type="hidden" id="b-cnt" value="3">
      </div>
    </div>
    <div style="background:var(--gray1);border-radius:10px;padding:10px 12px;margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;color:var(--tx3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">Aperçu</div>
      <div id="b-preview" style="display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>
    <div class="qf qfu" style="margin-bottom:10px">
      <label>Plateforme</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px" id="b-plat-pills">
        <button type="button" class="pill on" data-val="Instagram" onclick="tP('b-plat-pills','b-plat',this)">📸 Instagram</button>
        <button type="button" class="pill" data-val="TikTok" onclick="tP('b-plat-pills','b-plat',this)">◆ TikTok</button>
        <button type="button" class="pill" data-val="YouTube" onclick="tP('b-plat-pills','b-plat',this)">▶ YouTube</button>
      </div>
      <input type="hidden" id="b-plat" value="Instagram">
    </div>
    <div class="qf qfu" style="margin-bottom:10px">
      <label>Format</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px" id="b-fmt-pills">
        <button type="button" class="pill on" data-val="Reel" onclick="tP('b-fmt-pills','b-fmt',this)">Reel</button>
        <button type="button" class="pill" data-val="Short" onclick="tP('b-fmt-pills','b-fmt',this)">Short</button>
        <button type="button" class="pill" data-val="Carrousel" onclick="tP('b-fmt-pills','b-fmt',this)">Carrousel</button>
        <button type="button" class="pill" data-val="Photo" onclick="tP('b-fmt-pills','b-fmt',this)">Photo</button>
      </div>
      <input type="hidden" id="b-fmt" value="Reel">
    </div>
    <div class="qf qfu" style="margin-bottom:4px">
      <label>Statut de départ</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px" id="b-st-pills">
        <button type="button" class="pill on" data-val="idee" onclick="tP('b-st-pills','b-st',this)">💡 Idée</button>
        <button type="button" class="pill" data-val="tourne" onclick="tP('b-st-pills','b-st',this)">🎬 Tourné</button>
        <button type="button" class="pill" data-val="monte" onclick="tP('b-st-pills','b-st',this)">✂ Monté</button>
        <button type="button" class="pill" data-val="publie" onclick="tP('b-st-pills','b-st',this)">✅ Publié</button>
      </div>
      <input type="hidden" id="b-st" value="idee">
    </div>
    <div class="mac">
      <button class="btn bsec" onclick="closeBatch()">Annuler</button>
      <button class="btn bprim" id="b-save-btn" onclick="saveBatch()">Créer <span id="b-cnt-save">3</span> réels →</button>
    </div>
  </div>
</div>

<!-- MODAL MODIFIER REEL -->
<div class="mbg" id="m-reel">
  <div class="msh" onclick="event.stopPropagation()">
    <div class="mhd"></div>
    <div class="mtl" id="m-reel-title">Réel</div>
    <div style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Statut</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px" id="m-reel-st-pills"></div>
    <div class="qg">
      <div class="qf qfu"><label>Titre</label><input type="text" id="mr-titre" placeholder="Titre du réel"></div>
      <div class="qf"><label>Vues</label><input type="number" id="mr-vues" placeholder="0"></div>
      <div class="qf"><label>Likes</label><input type="number" id="mr-likes" placeholder="0"></div>
    </div>
    <div class="mac">
      <button class="btn bsec" onclick="closeReel()">Fermer</button>
      <button class="btn bprim" onclick="saveReel()">Sauvegarder</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SB='https://fytcyqvvmxbnvingvaen.supabase.co';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5dGN5cXZ2bXhibnZpbmd2YWVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODcwNjQsImV4cCI6MjA5MTk2MzA2NH0.XFBMB9FSV_sIFW0EFS0-H1KCRYbiXLiz-d-QF5-rLtU';
var H={'apikey':SK,'Authorization':'Bearer '+SK};
var HJ={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation'};
var HPa={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'};

function sbF(t,p){return fetch(SB+'/rest/v1/'+t+'?'+(p||''),{headers:H}).then(function(r){if(!r.ok)return[];return r.json();}).catch(function(){return[];});}
function sbP(t,d){return fetch(SB+'/rest/v1/'+t,{method:'POST',headers:HJ,body:JSON.stringify(d)}).then(function(r){return r.json();});}
function sbPa(t,id,d){return fetch(SB+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:HPa,body:JSON.stringify(d)});}

function g(id){return document.getElementById(id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtK(n){n=n||0;return n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'k':String(n);}
function fmtD(s){if(!s)return'';var d=new Date(s+'T00:00:00');return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();}
function toast(msg){var t=g('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2400);}
function tP(grp,hid,btn){document.querySelectorAll('#'+grp+' .pill').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');g(hid).value=btn.getAttribute('data-val');}
// Comparaison UUID-safe
function eqId(a,b){return String(a)===String(b);}
function findPost(id){for(var i=0;i<POSTS.length;i++){if(eqId(POSTS[i].id,id))return POSTS[i];}return null;}

var CL=null,FACT={},LIVS=[],MSGS=[],STATS=[],POSTS=[];
var PLAT_IC={Instagram:'📸',TikTok:'◆',YouTube:'▶'};
var SLV={en_attente:'En attente',en_cours:'En cours',livre:'Livré',valide:'Validé',revision:'Révision'};
var SLC={en_attente:'b-wait',en_cours:'b-wip',livre:'b-done',valide:'b-ok',revision:'b-rev'};
var PSM={idee:{label:'Idée',cls:'sc-idee'},tourne:{label:'Tourné',cls:'sc-tourne'},monte:{label:'Monté',cls:'sc-monte'},publie:{label:'Publié',cls:'sc-publie'}};

// ══ INIT ══
var token=new URLSearchParams(window.location.search).get('token');
if(!token){g('app-loading').style.display='none';g('app-error').style.display='flex';}
else{
  sbF('clients','token=eq.'+token+'&select=*').then(function(r){
    if(!r||!r[0]||!r[0].id){g('app-loading').style.display='none';g('app-error').style.display='flex';return;}
    CL=r[0];
    g('top-name').textContent=CL.nom;
    var cid=CL.id;
    // Chaque requête indépendante — si l'une échoue les autres continuent
    Promise.all([
      sbF('facturation','client_id=eq.'+cid+'&select=*'),
      sbF('livrables','client_id=eq.'+cid+'&select=*&order=created_at.asc'),
      sbF('messages','client_id=eq.'+cid+'&select=*&order=created_at.asc'),
      sbF('stats_clients','client_id=eq.'+cid+'&select=*&order=mois.desc'),
      sbF('posts_clients','client_id=eq.'+cid+'&select=*&order=semaine.asc,reel.asc')
    ]).then(function(r){
      FACT=(r[0]&&r[0][0])||{};

      MSGS=r[2]||[];
      STATS=r[3]||[];
      POSTS=r[4]||[];
      g('app-loading').style.display='none';
      g('app').style.display='block';
      renderAll();
    });
  });
}

function renderAll(){renderAccueil();renderContenu();renderLivs();renderStats();renderFactu();renderMsgs();}

// ══ NAV ══
function showTab(tab){

// ══ ACCUEIL ══
function renderAccueil(){
  g('welcome-title').textContent='Bonjour, '+CL.nom+' !';
  var done=LIVS.filter(function(l){return l.statut==='livre'||l.statut==='valide';}).length;
  var livPct=LIVS.length?Math.round(done/LIVS.length*100):0;
  var livPc=livPct>=100?'var(--grn)':livPct>=50?'var(--org)':'var(--red)';
  var pub=POSTS.filter(function(p){return p.statut==='publie';}).length;
  var obj=30;var pPct=Math.min(100,Math.round(pub/obj*100));
  g('accueil-kpis').innerHTML=
    '<div class="kc dark"><div class="kl">Espace</div><div class="kv" style="font-size:14px;font-weight:700;line-height:1.4">'+esc(CL.nom)+'</div><div class="ks" style="color:rgba(255,255,255,.4)">'+(CL.secteur||'Obsidian Capture')+'</div></div>'+
    '<div class="kc"><div class="kl">Livrables</div><div class="kv cg">'+done+'<span style="font-size:13px;font-weight:400;color:var(--tx3)">/'+LIVS.length+'</span></div><div class="prog"><div class="prog-f" style="width:'+livPct+'%;background:'+livPc+'"></div></div></div>'+
    '<div class="kc"><div class="kl">Réels postés</div><div class="kv cg">'+pub+'</div><div class="ks cm">/ '+obj+' objectif<div class="prog"><div class="prog-f" style="width:'+pPct+'%;background:var(--grn)"></div></div></div></div>';
  var pending=LIVS.filter(function(l){return l.statut!=='valide';}).slice(0,3);
  g('accueil-preview').innerHTML=pending.length?
    '<div style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Livrables en cours</div>'+
    pending.map(function(l){return'<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--gray2)"><div style="flex:1;font-size:13px;font-weight:600">'+esc(l.titre)+'</div><span class="badge '+(SLC[l.statut]||'b-wait')+'">'+SLV[l.statut]+'</span></div>';}).join(''):'';
}

// ══ CONTENU ══
function renderContenu(){
  var pub=POSTS.filter(function(p){return p.statut==='publie';}).length;
  var prets=POSTS.filter(function(p){return p.statut==='monte';}).length;
  var obj=30;var pct=Math.min(100,Math.round(pub/obj*100));var pc=pct>=100?'var(--grn)':pct>=60?'var(--org)':'var(--red)';
  g('contenu-kpis').innerHTML=
    '<div class="kc dark"><div class="kl">Total réels</div><div class="kv">'+POSTS.length+'</div><div class="ks" style="color:rgba(255,255,255,.4)">ce mois</div></div>'+
    '<div class="kc"><div class="kl">Postés</div><div class="kv cg">'+pub+'</div><div class="ks cm">/ '+obj+'<div class="prog"><div class="prog-f" style="width:'+pct+'%;background:'+pc+'"></div></div></div></div>'+
    '<div class="kc"><div class="kl">Prêts</div><div class="kv ca">'+prets+'</div><div class="ks ca">à poster</div></div>';
  if(!POSTS.length){
    g('contenu-body').innerHTML='<div class="empty"><div class="empty-i">▶</div><div class="empty-t">Aucun réel pour l\'instant</div><div class="empty-s">Cliquez sur "+ Batch" ci-dessus pour commencer</div></div>';
    return;
  }
  var weeks={};
  POSTS.forEach(function(p){var wk=p.semaine||0;if(!weeks[wk])weeks[wk]=[];weeks[wk].push(p);});
  var wks=Object.keys(weeks).map(Number).sort(function(a,b){return a-b;});
  var html='';
  wks.forEach(function(wk){
    var wp=weeks[wk];
    var pubW=wp.filter(function(p){return p.statut==='publie';}).length;
    var tot=wp.length;
    var pctW=Math.min(100,Math.round(pubW/7*100));
    var done=tot>=7;
    html+='<div class="week-hdr">'+
      '<span class="week-lbl">Semaine '+wk+'</span>'+
      '<span style="font-size:11px;color:var(--tx3)">'+tot+' réels</span>'+
      (done?'<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:var(--gnb);color:var(--grn);font-weight:700">Complète ✓</span>':'')+
      '<div class="week-prog"><div class="week-prog-f" style="width:'+pctW+'%;background:'+(done?'var(--grn)':'var(--black)')+'"></div></div>'+
      '<span style="font-size:11px;font-weight:700;color:var(--tx3)">'+pubW+'/7</span>'+
      '</div>';
    wp.sort(function(a,b){return(a.reel||0)-(b.reel||0);});
    wp.forEach(function(p){
      var isBonus=p.reel>7;
      var st=PSM[p.statut]||{label:p.statut||'—',cls:'sc-idee'};
      var pi=PLAT_IC[p.plateforme]||'•';
      html+='<div class="reel-row">'+
        '<div class="reel-num" style="'+(isBonus?'background:var(--blb);color:var(--blu)':'background:rgba(192,86,33,.15);color:var(--org)')+'" onclick="openReel(\''+p.id+'\')">'+p.reel+'</div>'+
        '<div onclick="openReel(\''+p.id+'\')" style="cursor:pointer;min-width:0">'+
          '<div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.titre||'S'+p.semaine+'R'+p.reel)+'</div>'+
          '<div style="font-size:11px;color:var(--tx3)">'+pi+' '+esc(p.plateforme||'')+(p.format?' · '+p.format:'')+'</div>'+
        '</div>'+
        '<span class="badge '+st.cls+'" onclick="cycleSt(\''+p.id+'\')" style="cursor:pointer">'+st.label+'</span>'+
        (p.vues?'<span style="font-size:12px;font-weight:700;color:var(--grn)">'+fmtK(p.vues)+' <span style="font-size:10px;color:var(--tx3)">vues</span></span>':'<span></span>')+
        '</div>';
    });
  });
  g('contenu-body').innerHTML=html;
}

// Cycle statut — 1 clic sur le badge
function cycleSt(id){
  var p=findPost(id);if(!p)return;
  var idx=ST_CYCLE.indexOf(p.statut);if(idx<0)idx=0;
  var next=ST_CYCLE[(idx+1)%ST_CYCLE.length];
  sbPa('posts_clients',id,{statut:next}).then(function(){
    p.statut=next;renderContenu();renderAccueil();toast(PSM[next].label+' ✓');
  });
}

// ══ BATCH ══
var B_CNT=3;
function openBatch(){
  B_CNT=3;g('b-cnt').value=3;g('b-cnt-lbl').textContent=3;g('b-cnt-save').textContent=3;
  g('b-plat').value='Instagram';g('b-fmt').value='Reel';g('b-st').value='idee';
  ['b-plat-pills','b-fmt-pills','b-st-pills'].forEach(function(id){
    document.querySelectorAll('#'+id+' .pill').forEach(function(b,i){b.classList.toggle('on',i===0);});
  });
  var mw=0;POSTS.forEach(function(p){if((p.semaine||0)>mw)mw=p.semaine;});
  var dw=mw>0?mw:1;var nw=Math.max(6,mw+2);var wh='';
  for(var w=1;w<=nw;w++){
    var cnt=POSTS.filter(function(p){return p.semaine===w;}).length;
    wh+='<button type="button" class="pill'+(w===dw?' on':'')+'" data-val="'+w+'" onclick="selWk(this)">S'+w+(cnt>0?' ('+cnt+')':'')+(cnt>=7?' ✓':'')+'</button>';
  }
  g('b-week-pills').innerHTML=wh;g('b-week').value=dw;
  updPreview();g('m-batch').classList.add('open');
}
function closeBatch(){g('m-batch').classList.remove('open');}
g('m-batch').addEventListener('click',function(e){if(e.target===g('m-batch'))closeBatch();});
function selWk(btn){document.querySelectorAll('#b-week-pills .pill').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');g('b-week').value=parseInt(btn.getAttribute('data-val'));updPreview();}
function adjB(d){B_CNT=Math.max(1,Math.min(20,B_CNT+d));g('b-cnt').value=B_CNT;g('b-cnt-lbl').textContent=B_CNT;g('b-cnt-save').textContent=B_CNT;updPreview();}
function updPreview(){
  var wk=parseInt(g('b-week').value)||1;
  var existing=POSTS.filter(function(p){return p.semaine===wk;}).length;
  var h='';
  for(var i=1;i<=B_CNT;i++){
    var rn=existing+i;var isB=rn>7;
    h+='<span style="'+(isB?'background:var(--blb);color:var(--blu)':'background:rgba(192,86,33,.12);color:var(--org)')+';padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700">S'+wk+'R'+rn+'</span>';
  }
  g('b-preview').innerHTML=h;
}
function saveBatch(){
  if(!CL){toast('Erreur client');return;}
  var wk=parseInt(g('b-week').value)||1;
  var plat=g('b-plat').value||'Instagram';
  var fmt=g('b-fmt').value||'Reel';
  var st=g('b-st').value||'idee';
  var btn=g('b-save-btn');
  btn.disabled=true;btn.textContent='Création en cours...';
  function createOne(idx){
    if(idx>=B_CNT){
      sbF('posts_clients','client_id=eq.'+CL.id+'&select=*&order=semaine.asc,reel.asc').then(function(posts){
        POSTS=Array.isArray(posts)?posts:[];
        btn.disabled=false;btn.innerHTML='Créer <span id="b-cnt-save">'+B_CNT+'</span> réels →';
        closeBatch();renderContenu();renderAccueil();
        toast(B_CNT+' réels S'+wk+' créés ✓');
      });
      return;
    }
    var existing=POSTS.filter(function(p){return p.semaine===wk;}).length+idx;
    var rn=existing+1;
    sbP('posts_clients',{client_id:CL.id,titre:'S'+wk+'R'+rn,semaine:wk,reel:rn,isBonus:rn>7,plateforme:plat,format:fmt,statut:st,vues:0}).then(function(r){
      createOne(idx+1);
    }).catch(function(){
      btn.disabled=false;btn.innerHTML='Créer <span id="b-cnt-save">'+B_CNT+'</span> réels →';
      toast('Erreur création');
    });
  }
  createOne(0);
}

// ══ MODIFIER REEL ══
var EDIT_ID=null;
function openReel(id){
  EDIT_ID=id;
  var p=findPost(id);if(!p)return;
  g('m-reel-title').textContent='S'+p.semaine+'R'+p.reel;
  g('mr-titre').value=p.titre||'';
  g('mr-vues').value=p.vues||'';
  g('mr-likes').value=p.likes||'';
  g('m-reel-st-pills').innerHTML=ST_CYCLE.map(function(s){
    var st=PSM[s];
    return'<button class="badge '+st.cls+'" onclick="setReelSt(\''+s+'\')" style="cursor:pointer;font-size:12px;padding:5px 12px;'+(p.statut===s?'outline:2px solid var(--black);outline-offset:2px':'')+'">'+st.label+'</button>';
  }).join('');
  g('m-reel').classList.add('open');
}
function setReelSt(s){
  var p=findPost(EDIT_ID);if(!p)return;
  p.statut=s;openReel(EDIT_ID);
}
function closeReel(){g('m-reel').classList.remove('open');EDIT_ID=null;}
g('m-reel').addEventListener('click',function(e){if(e.target===g('m-reel'))closeReel();});
function saveReel(){
  if(!EDIT_ID)return;
  var p=findPost(EDIT_ID);if(!p)return;
  var titre=g('mr-titre').value||p.titre;
  var vues=parseInt(g('mr-vues').value)||0;
  var likes=parseInt(g('mr-likes').value)||0;
  sbPa('posts_clients',EDIT_ID,{titre:titre,statut:p.statut,vues:vues,likes:likes}).then(function(){
    p.titre=titre;p.vues=vues;p.likes=likes;
    closeReel();renderContenu();renderAccueil();toast('Mis à jour ✓');

}

// ══ LIVRABLES ══

    var cls=SLC[l.statut]||'b-wait';var lbl=SLV[l.statut]||l.statut;
    var dotColor=l.statut==='livre'||l.statut==='valide'?'var(--grn)':l.statut==='revision'?'var(--org)':l.statut==='en_cours'?'var(--blu)':'var(--gray3)';
    var html='<div class="liv-item"><div class="liv-dot" style="background:'+dotColor+'"></div><div class="liv-info">'+
      '<div style="font-size:13px;font-weight:700">'+esc(l.titre)+'</div>'+
      '<div style="font-size:11px;color:var(--tx3);margin-top:2px">'+(l.format||'')+(l.plateforme?' · '+l.plateforme:'')+(l.date_prevue?' · '+fmtD(l.date_prevue):'')+'</div>'+

    if(l.statut==='livre'||l.statut==='revision'){
      html+='<div style="margin-top:8px">'+
        '<div style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Laisser un commentaire</div>'+
        '<div class="comment-form"><textarea class="comment-input" id="comm-'+l.id+'" placeholder="Votre retour...">'+(l.notes_client||'')+'</textarea><button class="cbtn" onclick="saveComment(\''+l.id+'\')">Envoyer</button></div></div>';
    }
    return html+'</div></div>';

function saveComment(livId){
  var txt=g('comm-'+livId);if(!txt)return;var val=txt.value.trim();
  sbPa('livrables',livId,{notes_client:val,statut:'revision'}).then(function(){
    for(var i=0;i<LIVS.length;i++){if(eqId(LIVS[i].id,livId)){LIVS[i].notes_client=val;LIVS[i].statut='revision';break;}}
    renderLivs();renderAccueil();toast('Commentaire envoyé ✓');
  });
}

// ══ STATS ══
function renderStats(){
  if(!STATS.length){g('stats-body').innerHTML='<div class="empty"><div class="empty-i">↗</div><div class="empty-t">Aucune donnée disponible</div><div class="empty-s">Vos stats seront affichées ici</div></div>';return;}
  var html='';
  CPLATS.forEach(function(plat){
    var ps=STATS.filter(function(s){return s.plateforme===plat.id;}).sort(function(a,b){return b.mois.localeCompare(a.mois);});
    if(!ps.length)return;
    var l=ps[0],prev=ps[1]||{},delta=(l.abonnes||0)-(prev.abonnes||0);
    html+='<div class="stat-plat-card" style="border-left:3px solid '+plat.color+'">'+
      '<div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:14px;font-weight:800;color:'+plat.color+'">'+plat.id+'</span><span style="font-size:11px;color:var(--tx3)">'+l.mois+'</span></div>'+
      '<div class="stat-g">'+
        '<div class="stat-b"><div class="sl">Abonnés</div><div class="sv">'+fmtK(l.abonnes)+'</div><div style="font-size:11px;font-weight:600;color:'+(delta>0?'var(--grn)':delta<0?'var(--red)':'var(--tx3)')+'">'+(delta>0?'+':'')+fmtK(delta)+'</div></div>'+
        '<div class="stat-b"><div class="sl">Vues</div><div class="sv">'+fmtK(l.vues)+'</div></div>'+
        '<div class="stat-b"><div class="sl">Engagement</div><div class="sv ca">'+(l.engagement?parseFloat(l.engagement).toFixed(1)+'%':'—')+'</div></div>'+
        '<div class="stat-b"><div class="sl">Nouveaux</div><div class="sv cg">+'+(l.nouveaux_abonnes||0)+'</div></div>'+
      '</div>'+
      (l.meilleur_post?'<div style="margin-top:8px;font-size:12px;color:var(--tx2);font-weight:600">🏆 '+esc(l.meilleur_post)+'</div>':'')+
      (ps.length>1?evoChart(ps,plat.color):'')+
    '</div>';
  });
  g('stats-body').innerHTML=html||'<div class="empty"><div class="empty-i">↗</div><div class="empty-t">Aucune donnée</div></div>';
}
function evoChart(ps,color){
  var pts=ps.slice(0,6).reverse();var max=0;pts.forEach(function(s){if((s.abonnes||0)>max)max=s.abonnes;});
  if(!max)return'';
  return'<div style="margin-top:10px;border-top:1px solid var(--gray2);padding-top:8px"><div style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Évolution abonnés</div>'+
    '<div class="evo-bar">'+pts.map(function(s){var h=Math.round((s.abonnes||0)/max*40);return'<div class="evo-col"><div class="evo-b" style="height:'+h+'px;background:'+color+';opacity:.8;min-height:2px"></div><div class="evo-x">'+s.mois.slice(5)+'</div></div>';}).join('')+'</div></div>';
}

// ══ FACTU ══
function renderFactu(){
  var f=FACT,budget=f.budget_total||0,acompte=f.acompte||0,solde=f.solde||0;
  var paye=(f.acompte_paye?acompte:0)+(f.solde_paye?solde:0);
  var pct=budget?Math.round(paye/budget*100):0;var pc=pct>=100?'var(--grn)':pct>=50?'var(--org)':'var(--red)';
  g('factu-body').innerHTML=
    '<div class="fact-row"><div style="font-size:13px;color:var(--tx2)">Budget total</div><div style="font-size:14px;font-weight:700">'+fmtK(budget)+'€</div></div>'+
    '<div class="fact-row"><div style="font-size:13px;color:var(--tx2)">Acompte'+(acompte?' ('+fmtK(acompte)+'€)':'')+'</div><span class="fact-tag '+(f.acompte_paye?'paid':'unpaid')+'">'+(f.acompte_paye?'✓ Payé':'En attente')+'</span></div>'+
    '<div class="fact-row"><div style="font-size:13px;color:var(--tx2)">Solde'+(solde?' ('+fmtK(solde)+'€)':'')+'</div><span class="fact-tag '+(f.solde_paye?'paid':'unpaid')+'">'+(f.solde_paye?'✓ Payé':'En attente')+'</span></div>'+
    (f.date_echeance?'<div class="fact-row"><div style="font-size:13px;color:var(--tx2)">Échéance</div><div style="font-size:13px;font-weight:700">'+fmtD(f.date_echeance)+'</div></div>':'')+
    '<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:5px"><span>'+fmtK(paye)+'€ payés</span><span>'+pct+'%</span></div><div class="prog"><div class="prog-f" style="width:'+pct+'%;background:'+pc+'"></div></div></div>'+
    (f.notes?'<div style="margin-top:10px;background:var(--gray1);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--tx2)">'+esc(f.notes)+'</div>':'');
}

// ══ MESSAGES ══
function renderMsgs(){
  var w=g('msg-list');
  if(!MSGS.length){w.innerHTML='<div class="empty"><div class="empty-i">💬</div><div class="empty-t">Aucun message</div></div>';return;}
  w.innerHTML=MSGS.map(function(m){
    var isO=m.auteur==='obsidian';
    return'<div style="display:flex;flex-direction:column;align-items:'+(isO?'flex-start':'flex-end')+'">'+
      '<div class="msg-bubble '+(isO?'obs':'cli')+'"><div class="msg-who">'+(isO?'Obsidian Capture':'Vous')+'</div>'+esc(m.contenu)+'</div></div>';
  }).join('');
  w.scrollTop=w.scrollHeight;
}
function sendMsg(){
  var inp=g('msg-in'),txt=inp.value.trim();if(!txt||!CL)return;inp.value='';
  sbP('messages',{client_id:CL.id,auteur:'client',contenu:txt}).then(function(){
    sbF('messages','client_id=eq.'+CL.id+'&select=*&order=created_at.asc').then(function(msgs){MSGS=msgs;renderMsgs();toast('Message envoyé ✓');});
  });
}

document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeBatch();closeReel();}});
</script>
</body>
